<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── User Timing: record the moment the HTML is parsed ─────────────── -->
    <!-- This is the earliest possible performance mark; works before any JS  -->
    <!-- module is loaded or parsed. Visible in DevTools Performance timeline  -->
    <!-- and via PerformanceObserver in the browser.                           -->
    <script>performance?.mark('html-parsed');</script>

    <!-- ── Resource hints ─────────────────────────────────────────────────── -->
    <!-- LCP hero is now served from local /Images/hero/ — no external origin. -->

    <!-- ── LCP hero image preload ─────────────────────────────────────────── -->
    <!--                                                                        -->
    <!-- CRITICAL: This <link rel="preload"> must match the srcset + sizes      -->
    <!-- used by the <img> in Hero.tsx exactly so the browser pairs the         -->
    <!-- preloaded bytes with the rendered element. Any mismatch causes a        -->
    <!-- double-download (preload wasted + fresh fetch on hydration).           -->
    <!--                                                                        -->
    <!-- Local WebP assets served from Netlify CDN — zero extra connection.    -->
    <!-- Mobile DPR note: A Moto G Power (412 px, DPR 2.625) computes a        -->
    <!-- display size of 480 px (from sizes) → needs 480×2.625 = 1260 px       -->
    <!-- intrinsic resolution → browser selects the 1200w entry (largest        -->
    <!-- available).                                                            -->
    <link
      rel="preload"
      as="image"
      href="/Images/hero/hero-1200.webp"
      imagesrcset="/Images/hero/hero-480.webp 480w, /Images/hero/hero-768.webp 768w, /Images/hero/hero-1200.webp 1200w"
      imagesizes="(max-width: 480px) 480px, (max-width: 768px) 768px, 100vw"
      fetchpriority="high"
    />
    <!-- Preload nav logo (above-the-fold, WebP) -->
    <link rel="preload" as="image" href="/Images/logo-128.webp" type="image/webp" />

    <!-- ── Google Analytics 4 — fully deferred, non-blocking ─────────────── -->
    <!-- GA is initialised immediately so gtag() calls work, but the network   -->
    <!-- request is deferred until the CPU is idle (or 3 s after load as       -->
    <!-- fallback). This prevents the GTM/GA script from creating long tasks    -->
    <!-- that inflate TBT during the initial render window.                    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-91F19C5VXB');

      if ('requestIdleCallback' in window) {
        requestIdleCallback(function() {
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-91F19C5VXB';
          document.head.appendChild(s);
        }, { timeout: 4000 });
      } else {
        window.addEventListener('load', function() {
          setTimeout(function() {
            var s = document.createElement('script');
            s.async = true;
            s.src = 'https://www.googletagmanager.com/gtag/js?id=G-91F19C5VXB';
            document.head.appendChild(s);
          }, 3000);
        });
      }
    </script>

    <!-- Primary SEO Meta -->
    <title>Wildfire Relief Donations for Long-Term Recovery | The Wildland Fire Recovery Fund</title>
    <meta
      name="description"
      content="Support wildfire relief donations to help families rebuild. The Wildland Fire Recovery Fund provides long-term wildfire recovery aid to displaced families and firefighters. 501(c)(3) nonprofit."
    />
    <meta name="author" content="The Wildland Fire Recovery Fund" />
    <meta name="publisher" content="The Wildland Fire Recovery Fund" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.thewildlandfirerecoveryfund.org/" />

    <!-- Theme -->
    <meta name="theme-color" content="#FF9933" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.thewildlandfirerecoveryfund.org/" />
    <meta
      property="og:title"
      content="Wildfire Relief Donations for Long-Term Recovery | The Wildland Fire Recovery Fund"
    />
    <meta
      property="og:description"
      content="Support wildfire relief donations to help families rebuild. The Wildland Fire Recovery Fund provides long-term wildfire recovery aid to displaced families and firefighters."
    />
    <meta property="og:site_name" content="The Wildland Fire Recovery Fund" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://www.thewildlandfirerecoveryfund.org/Images/hero/hero-1200.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/webp" />
    <meta property="og:image:alt" content="Wildland Fire Recovery Fund - Supporting wildfire survivors" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.thewildlandfirerecoveryfund.org/" />
    <meta
      name="twitter:title"
      content="Wildfire Relief Donations for Long-Term Recovery | The Wildland Fire Recovery Fund"
    />
    <meta
      name="twitter:description"
      content="Support wildfire relief donations to help families rebuild. Long-term wildfire recovery aid for displaced families and firefighters."
    />
    <meta name="twitter:image" content="https://www.thewildlandfirerecoveryfund.org/Images/hero/hero-1200.webp" />
    <meta name="twitter:image:alt" content="Wildland Fire Recovery Fund - Supporting wildfire survivors" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <script type="module" crossorigin src="/js/index.BIncoa5P.js"></script>
    <link rel="modulepreload" crossorigin href="/js/react-core.BwXzZjie.js">
    <link rel="modulepreload" crossorigin href="/js/vendor.ByYTZpO7.js">
        <link rel="modulepreload" crossorigin href="/js/ui.Di1N4U15.js">
            <link rel="modulepreload" crossorigin href="/js/router.vSZlPq4T.js">
    <link rel="stylesheet" crossorigin href="/assets/index.D4YKgPVt.css">
  </head>

  <body>
    <div id="root"></div>
    
    <!-- Register Service Worker for caching -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {
            // Service worker registration failed, that's okay
          });
        });
      }
    </script>
  </body>
