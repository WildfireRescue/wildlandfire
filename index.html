<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── User Timing: record the moment the HTML is parsed ─────────────── -->
    <!-- This is the earliest possible performance mark; works before any JS  -->
    <!-- module is loaded or parsed. Visible in DevTools Performance timeline  -->
    <!-- and via PerformanceObserver in the browser.                           -->
    <script>performance?.mark('html-parsed');</script>

    <!-- ── Resource hints ─────────────────────────────────────────────────── -->
    <!-- Only Unsplash is preconnected — the only external origin that serves  -->
    <!-- content needed for the LCP image. GTM is loaded via requestIdleCallback -->
    <!-- so preconnecting to it here gains nothing and wastes a connection slot. -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
    <link rel="dns-prefetch" href="https://images.unsplash.com">

    <!-- ── LCP hero image preload ─────────────────────────────────────────── -->
    <!--                                                                        -->
    <!-- CRITICAL: This <link rel="preload"> must match the srcset + sizes      -->
    <!-- used by the <img> in Hero.tsx exactly so the browser pairs the         -->
    <!-- preloaded bytes with the rendered element. Any mismatch causes a        -->
    <!-- double-download (preload wasted + fresh fetch on hydration).           -->
    <!--                                                                        -->
    <!-- Mobile DPR note: A Moto G Power (412 px, DPR 2.625) computes a        -->
    <!-- display size of 480 px (from sizes) → needs 480×2.625 = 1260 px       -->
    <!-- intrinsic resolution → browser selects the 1200w entry (largest        -->
    <!-- available). Quality reduced to q=62 to save ~20 % bytes vs q=68.      -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1562457346-b1b743feb764?crop=entropy&cs=tinysrgb&fit=max&fm=webp&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmaXJlZmlnaHRlciUyMGFjdGlvbnxlbnwxfHx8fDE3NjU4NDY0NDV8MA&ixlib=rb-4.1.0&q=62&w=1200"
      imagesrcset="https://images.unsplash.com/photo-1562457346-b1b743feb764?crop=entropy&cs=tinysrgb&fit=max&fm=webp&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmaXJlZmlnaHRlciUyMGFjdGlvbnxlbnwxfHx8fDE3NjU4NDY0NDV8MA&ixlib=rb-4.1.0&q=55&w=480 480w, https://images.unsplash.com/photo-1562457346-b1b743feb764?crop=entropy&cs=tinysrgb&fit=max&fm=webp&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmaXJlZmlnaHRlciUyMGFjdGlvbnxlbnwxfHx8fDE3NjU4NDY0NDV8MA&ixlib=rb-4.1.0&q=63&w=768 768w, https://images.unsplash.com/photo-1562457346-b1b743feb764?crop=entropy&cs=tinysrgb&fit=max&fm=webp&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmaXJlZmlnaHRlciUyMGFjdGlvbnxlbnwxfHx8fDE3NjU4NDY0NDV8MA&ixlib=rb-4.1.0&q=62&w=1200 1200w"
      imagesizes="(max-width: 480px) 480px, (max-width: 768px) 768px, 100vw"
      fetchpriority="high"
    />
    <!-- Preload nav logo (above-the-fold, WebP) -->
    <link rel="preload" as="image" href="/Images/logo-128.webp" type="image/webp" />

    <!-- ── Google Analytics 4 — fully deferred, non-blocking ─────────────── -->
    <!-- GA is initialised immediately so gtag() calls work, but the network   -->
    <!-- request is deferred until the CPU is idle (or 3 s after load as       -->
    <!-- fallback). This prevents the GTM/GA script from creating long tasks    -->
    <!-- that inflate TBT during the initial render window.                    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-91F19C5VXB');

      if ('requestIdleCallback' in window) {
        requestIdleCallback(function() {
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-91F19C5VXB';
          document.head.appendChild(s);
        }, { timeout: 4000 });
      } else {
        window.addEventListener('load', function() {
          setTimeout(function() {
            var s = document.createElement('script');
            s.async = true;
            s.src = 'https://www.googletagmanager.com/gtag/js?id=G-91F19C5VXB';
            document.head.appendChild(s);
          }, 3000);
        });
      }
    </script>

    <!-- Primary SEO Meta -->
    <title>The Wildland Fire Recovery Fund | Long Term Recovery After Wildfires</title>
    <meta
      name="description"
      content="The Wildland Fire Recovery Fund supports long term recovery for wildfire affected communities, families, and first responders. We help after the flames are out."
    />
    <meta name="author" content="The Wildland Fire Recovery Fund" />
    <meta name="publisher" content="The Wildland Fire Recovery Fund" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.thewildlandfirerecoveryfund.org/" />

    <!-- Theme -->
    <meta name="theme-color" content="#FF9933" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.thewildlandfirerecoveryfund.org/" />
    <meta
      property="og:title"
      content="The Wildland Fire Recovery Fund | Long Term Recovery After Wildfires"
    />
    <meta
      property="og:description"
      content="Supporting long term recovery for wildfire affected communities, families, and first responders after the flames are out."
    />
    <meta property="og:site_name" content="The Wildland Fire Recovery Fund" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1562457346-b1b743feb764?w=1200&h=630&fit=crop&fm=webp&q=75" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/webp" />
    <meta property="og:image:alt" content="Wildland Fire Recovery Fund - Supporting wildfire survivors" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.thewildlandfirerecoveryfund.org/" />
    <meta
      name="twitter:title"
      content="The Wildland Fire Recovery Fund | Long Term Recovery After Wildfires"
    />
    <meta
      name="twitter:description"
      content="Supporting long term recovery for wildfire affected communities, families, and first responders after the flames are out."
    />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1562457346-b1b743feb764?w=1200&h=630&fit=crop&fm=webp&q=75" />
    <meta name="twitter:image:alt" content="Wildland Fire Recovery Fund - Supporting wildfire survivors" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register Service Worker for caching -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {
            // Service worker registration failed, that's okay
          });
        });
      }
    </script>
  </body>
</html>
